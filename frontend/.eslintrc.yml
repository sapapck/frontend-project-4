root: true
env:
  browser: true
  es2021: true
  node: true

parserOptions:
  ecmaVersion: latest
  sourceType: module

extends:
  - eslint:recommended

rules:
  semi: 0
  comma-dangle: 0
  arrow-parens: 0
  no-unused-vars: 0
  no-console: 0
  import/no-cycle: 0
  '@stylistic/semi': 0
  '@stylistic/comma-dangle': 0
  '@stylistic/arrow-parens': 0
